apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    component: mysql
spec:
  selector:
    # Labels are used as selectors.
    project: roboshop
    tier: database
    component: mysql
  ports:
  - protocol: TCP
    port: 3306          # Service Port
    targetPort: 3306    # Container Port 