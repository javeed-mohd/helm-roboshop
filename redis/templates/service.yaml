apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    component: redis
spec:
  selector:
    # Labels are used as selectors.
    project: roboshop
    tier: database
    component: redis
  ports:
  - protocol: TCP
    port: 6379          # Service Port
    targetPort: 6379    # Container Port